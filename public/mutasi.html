<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mutasi Transaksi - MalzzPedia</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">
        <span class="logo-icon"><i class="fas fa-fire"></i></span>
        <span class="logo-text">Malzz<span class="logo-accent">Pedia</span></span>
      </a>
      <div class="nav-links">
        <span style="font-size:13px;color:var(--text-muted);font-weight:500;padding:0 8px;">Admin Panel</span>
        <a href="/admin" class="nav-link">Dashboard</a>
        <a href="/logout" class="nav-link" id="logoutBtn">Logout</a>
      </div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-title">Menu</div>
      <a href="/admin" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a>
      <a href="/mutasi" class="sidebar-link active"><i class="fas fa-receipt"></i> Mutasi Transaksi</a>
      <div class="admin-sidebar-title">Produk</div>
      <a href="/admin#produk-section" class="sidebar-link"><i class="fas fa-gamepad"></i> Kelola Produk</a>
      <a href="/admin#tambah-produk" class="sidebar-link"><i class="fas fa-plus-circle"></i> Tambah Produk</a>
      <div class="admin-sidebar-title">Aksi</div>
      <a href="/" class="sidebar-link" target="_blank"><i class="fas fa-external-link-alt"></i> Lihat Website</a>
      <a href="/logout" class="sidebar-link" style="color:var(--danger)"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="admin-main">
      <h2><i class="fas fa-receipt"></i> Mutasi Transaksi</h2>

      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center;">
        <div class="search-bar" style="margin-bottom:0;flex:1;min-width:200px;">
          <i class="fas fa-search"></i>
          <input type="text" id="filterInput" placeholder="Cari ID, produk, tujuan..." oninput="filterTable()" />
        </div>
        <select id="statusFilter" onchange="filterTable()" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:white;cursor:pointer;outline:none;">
          <option value="">Semua Status</option>
          <option value="success">Sukses</option>
          <option value="pending">Pending</option>
          <option value="failed">Gagal</option>
        </select>
        <button class="btn btn-outline" onclick="loadMutasi()"><i class="fas fa-sync"></i> Refresh</button>
      </div>

      <div class="table-card">
        <div class="table-card-header">
          <h3><i class="fas fa-list"></i> Riwayat Transaksi</h3>
          <span id="totalCount" style="font-size:13px;color:var(--text-muted);font-weight:500;"></span>
        </div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Produk</th>
                <th>Tujuan</th>
                <th>Nominal Deposit</th>
                <th>Harga Produk</th>
                <th>Profit</th>
                <th>Status Deposit</th>
                <th>Status Order</th>
                <th>ID Order</th>
              </tr>
            </thead>
            <tbody id="mutasiBody">
              <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted);">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="table-card" id="summaryCard" style="display:none;">
        <div class="table-card-header">
          <h3><i class="fas fa-chart-pie"></i> Ringkasan</h3>
        </div>
        <div style="padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;" id="summaryGrid"></div>
      </div>
    </main>
  </div>

  <script>
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/logout');
      location.href = '/login';
    });

    function formatRupiah(n) { return 'Rp ' + parseInt(n || 0).toLocaleString('id-ID'); }
    function formatDate(d) {
      return new Date(d).toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    let allData = [];

    function badgeStatus(status) {
      const map = {
        success: 'badge-success',
        pending: 'badge-warning',
        process: 'badge-warning',
        failed: 'badge-danger',
        menunggu_pembayaran: 'badge-warning',
        gagal_buat_order: 'badge-danger',
      };
      const cls = map[status] || 'badge-default';
      return `<span class="badge ${cls}">${status || '-'}</span>`;
    }

    function renderTable(data) {
      const tbody = document.getElementById('mutasiBody');
      document.getElementById('totalCount').textContent = `${data.length} transaksi`;
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted);">Tidak ada data</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(t => `
        <tr>
          <td style="font-size:12px;color:var(--text-muted);white-space:nowrap;">${formatDate(t.tanggal)}</td>
          <td><strong style="font-size:13px;">${t.productCode}</strong></td>
          <td style="font-size:13px;">${t.tujuan}</td>
          <td style="font-size:13px;">${t.nominalDeposit ? formatRupiah(t.nominalDeposit) : '-'}</td>
          <td style="font-size:13px;">${t.hargaProduk ? formatRupiah(t.hargaProduk) : '-'}</td>
          <td style="font-size:13px;font-weight:600;color:${(t.untung||0) > 0 ? 'var(--success)' : 'var(--text-muted)'};">${t.untung ? formatRupiah(t.untung) : '-'}</td>
          <td>${badgeStatus(t.statusDeposit)}</td>
          <td>${badgeStatus(t.statusOrder)}</td>
          <td style="font-size:11px;color:var(--text-muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;">${t.idOrder || '-'}</td>
        </tr>
      `).join('');
    }

    function filterTable() {
      const q = document.getElementById('filterInput').value.toLowerCase();
      const s = document.getElementById('statusFilter').value;
      const filtered = allData.filter(t => {
        const matchQ = !q || t.productCode?.toLowerCase().includes(q) || t.tujuan?.toLowerCase().includes(q) || t.internalTrxId?.toLowerCase().includes(q);
        const matchS = !s || t.statusOrder === s || t.statusDeposit === s;
        return matchQ && matchS;
      });
      renderTable(filtered);
    }

    async function loadMutasi() {
      const tbody = document.getElementById('mutasiBody');
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted);">Memuat data...</td></tr>';
      try {
        const res = await fetch('/api/mutasi');
        if (res.status === 401) { location.href = '/login'; return; }
        const data = await res.json();
        if (data.success) {
          allData = data.data;
          renderTable(allData);

          const sukses = allData.filter(t => t.statusOrder === 'success').length;
          const totalProfit = allData.reduce((a, b) => a + (b.untung || 0), 0);
          const totalDeposit = allData.reduce((a, b) => a + (b.nominalDeposit || 0), 0);
          const gagal = allData.filter(t => t.statusOrder === 'failed' || t.statusOrder === 'gagal_buat_order').length;

          document.getElementById('summaryCard').style.display = 'block';
          document.getElementById('summaryGrid').innerHTML = `
            <div class="stat-card"><div class="stat-card-icon blue"><i class="fas fa-list"></i></div><div class="stat-card-body"><div class="stat-card-label">Total Transaksi</div><div class="stat-card-num">${allData.length}</div></div></div>
            <div class="stat-card"><div class="stat-card-icon green"><i class="fas fa-check"></i></div><div class="stat-card-body"><div class="stat-card-label">Sukses</div><div class="stat-card-num">${sukses}</div></div></div>
            <div class="stat-card"><div class="stat-card-icon yellow"><i class="fas fa-coins"></i></div><div class="stat-card-body"><div class="stat-card-label">Total Deposit</div><div class="stat-card-num" style="font-size:16px;">${formatRupiah(totalDeposit)}</div></div></div>
            <div class="stat-card"><div class="stat-card-icon purple"><i class="fas fa-chart-line"></i></div><div class="stat-card-body"><div class="stat-card-label">Total Profit</div><div class="stat-card-num" style="font-size:16px;">${formatRupiah(totalProfit)}</div></div></div>
          `;
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--danger);">Gagal memuat data</td></tr>';
      }
    }

    loadMutasi();
  </script>
</body>
</html>
