<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - MalzzPedia</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <a href="/" class="nav-logo" style="justify-content:center;margin-bottom:6px;">
          <span class="logo-icon"><i class="fas fa-fire"></i></span>
          <span class="logo-text">Malzz<span class="logo-accent">Pedia</span></span>
        </a>
        <p>Login ke Panel Admin</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <div class="input-icon">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Username admin" required />
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required />
          </div>
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner-sm"></div> Logging in...';
      try {
        const res = await fetch('/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) { location.href = '/admin'; }
        else {
          errEl.textContent = data.message || 'Username atau password salah';
          btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        }
      } catch(e) {
        errEl.textContent = 'Terjadi kesalahan. Coba lagi.';
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    });
  </script>
</body>
</html>
